<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMU - Server Statistics</title>
    <script src="translations.js"></script>
    <style>
        :root {
            --primary: #d4af37;
            --text: #e0e0e0;
            --glass: rgba(20, 20, 20, 0.75);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            color: var(--text);
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('mubg.jpg') no-repeat center center fixed;
            background-size: cover;
            background-color: #0a0a0a;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9);
            width: 90%;
            max-width: 800px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--primary);
        }

        /* Przełącznik języków w stylu EN | PL */
        .lang-switch {
            text-align: right;
            font-size: 0.7rem;
            margin-bottom: -10px;
            font-weight: bold;
        }

        .lang-switch span {
            cursor: pointer;
            color: #666;
            transition: 0.3s;
            padding: 0 5px;
        }

        .lang-switch span.active {
            color: var(--primary);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.75rem;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .char-name {
            font-weight: bold;
            color: #fff;
        }

        .rank-number {
            color: var(--primary);
            font-weight: bold;
            width: 30px;
        }

        .reset-badge {
            background: rgba(212, 175, 55, 0.15);
            color: var(--primary);
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 10px;
            display: inline-block;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:nth-child(1) .char-name {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        tr:nth-child(1) .reset-badge {
            background: rgba(255, 215, 0, 0.25);
            border-color: #ffd700;
        }

        /* Szklana Nawigacja */
        .footer-nav {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .nav-link {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            border-radius: 8px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .nav-link:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .loader {
            text-align: center;
            padding: 20px;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="lang-switch">
            <span onclick="setLanguage('en')" id="en-btn">EN</span> |
            <span onclick="setLanguage('pl')" id="pl-btn">PL</span>
        </div>

        <h2 data-i18n="rankingTitle">Top 10 Heroes</h2>

        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th data-i18n="charName">Character</th>
                    <th data-i18n="charClass">Class</th>
                    <th data-i18n="charLvl">Level</th>
                </tr>
            </thead>
            <tbody id="rankingBody">
                <tr>
                    <td colspan="4" class="loader">...</td>
                </tr>
            </tbody>
        </table>

        <div class="footer-nav">
            <a href="/" class="nav-link">
                <span data-i18n="navRegister">Register Account</span>
            </a>
            <a href="/changepass" class="nav-link">
                <span data-i18n="navChangePass">Change Password</span>
            </a>
        </div>
    </div>

    <script>
        function setLanguage(lang) {
            const t = window.muTranslations[lang];
            localStorage.setItem('preferred-lang', lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });

            document.getElementById('en-btn').className = lang === 'en' ? 'active' : '';
            document.getElementById('pl-btn').className = lang === 'pl' ? 'active' : '';
        }

        // Inicjalizacja języka
        setLanguage(localStorage.getItem('preferred-lang') || 'en');

        async function loadRanking() {
            const rankingBody = document.getElementById('rankingBody');

            try {
                const response = await fetch('/api/public/ranking');
                if (!response.ok) throw new Error('Failed to load');

                const data = await response.json();

                if (!data || data.length === 0) {
                    rankingBody.innerHTML = '<tr><td colspan="4" style="text-align:center">No heroes found.</td></tr>';
                    return;
                }

                rankingBody.innerHTML = data.map((char, index) => `
                    <tr>
                        <td class="rank-number">${index + 1}</td>
                        <td class="char-name">${char.name}</td>
                        <td style="color: #aaa; font-size: 0.85rem; font-style: italic;">${char.className}</td>
                        <td style="white-space: nowrap;">
                            <span style="color: #fff; font-weight: bold;">${char.level}</span>
                            <span class="reset-badge">${char.resets} RR</span>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                rankingBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: #e74c3c;">Connection error.</td></tr>';
            }
        }

        loadRanking();
    </script>
</body>

</html>
