<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMU - Server Statistics</title>
    <link rel="stylesheet" href="style.css">
    <script src="en.js"></script>
    <script src="pl.js"></script>
</head>

<body class="stats-body">
    <div class="container">
        <div class="lang-switch">
            <span onclick="setLanguage('en')" id="en-btn">EN</span> |
            <span onclick="setLanguage('pl')" id="pl-btn">PL</span>
        </div>

        <h2 data-i18n="rankingTitle">Top 10 Heroes</h2>

        <div class="server-status" id="serverStatus">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Checking...</span>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">#</th>
                    <th data-i18n="charName">Character</th>
                    <th data-i18n="charClass">Class</th>
                    <th data-i18n="charLvl">Level</th>
                </tr>
            </thead>
            <tbody id="rankingBody">
                <tr>
                    <td colspan="4" class="table-loader">...</td>
                </tr>
            </tbody>
        </table>

        <div class="footer-nav">
            <a href="/" class="nav-link">
                <span data-i18n="navHome">Strona Główna</span>
            </a>
            <a href="/events" class="nav-link">
                <span data-i18n="navEvents">Wydarzenia</span>
            </a>
        </div>
    </div>
    <div class="credits">
    <a href="https://github.com/nolt" target="_blank">
        <span>&lt;/&gt; with ❤️ by</span> Nolt
    </a>
    </div>

    <script>
        function setLanguage(lang) {
            const t = window.muTranslations[lang];
            localStorage.setItem('preferred-lang', lang);

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });

            document.getElementById('en-btn').className = lang === 'en' ? 'active' : '';
            document.getElementById('pl-btn').className = lang === 'pl' ? 'active' : '';
        }

        setLanguage(localStorage.getItem('preferred-lang') || 'en');

        async function checkServerStatus() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const t = window.muTranslations[localStorage.getItem('preferred-lang') || 'en'];

            try {
                const response = await fetch('/api/public/server-status');
                const data = await response.json();

                if (data.online) {
                    statusDot.className = 'status-dot online';
                    statusText.innerText = t.online || 'Online';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.innerText = t.offline || 'Offline';
                }
            } catch {
                statusDot.className = 'status-dot offline';
                statusText.innerText = t.offline || 'Offline';
            }
        }

        checkServerStatus();
        setInterval(checkServerStatus, 30000);

        async function loadRanking() {
            const rankingBody = document.getElementById('rankingBody');
            const t = window.muTranslations[localStorage.getItem('preferred-lang') || 'en'];

            try {
                const response = await fetch('/api/public/ranking');
                if (!response.ok) throw new Error('Failed to load');

                const data = await response.json();

                if (!data || data.length === 0) {
                    rankingBody.innerHTML = `<tr><td colspan="4" style="text-align:center">${t.rankingNone}</td></tr>`;
                    return;
                }

                rankingBody.innerHTML = data.map((char, index) => `
                    <tr>
                        <td class="rank-number">${index + 1}</td>
                        <td class="char-name">${char.name}</td>
                        <td style="color: #aaa; font-size: 0.85rem; font-style: italic;">${char.className}</td>
                        <td style="white-space: nowrap;">
                            <span style="color: #fff; font-weight: bold; display: inline-block; width: 32px; text-align: right;">${char.level}</span>
                            <span class="reset-badge">${char.resets} RR</span>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                rankingBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color: #e74c3c;">${t.rankingError}</td></tr>`;
            }
        }

        loadRanking();
    </script>
</body>

</html>
